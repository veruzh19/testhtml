<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR.js - Cohete Interactivo</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;" 
        gesture-detector
        shadow="type: pcfsoft"
        renderer="antialias: true; colorManagement: true;">

        <a-assets>
            <a-asset-item id="coheteModel" src="brujula.glb"></a-asset-item>
        </a-assets>

        <a-marker 
            preset="hiro" 
            raycaster="objects: .clickable" 
            emitevents="true" 
            cursor="fuse: false; rayOrigin: mouse;">
            
            <a-entity 
                id="cohete"
                gltf-model="#coheteModel" 
                position="0 0 0" 
                scale="0.5 0.5 0.5" 
                class="clickable"
                gesture-handler="minScale: 0.1; maxScale: 5;"
                shadow="cast: true; receive: false"
                animation-mixer>
            </a-entity>

            <a-plane 
                rotation="-90 0 0" 
                width="4" 
                height="4" 
                shadow="receive: true" 
                material="color: #000; opacity: 0.3; transparent: true;">
            </a-plane>

        </a-marker>

        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity 
            light="type: directional; castShadow: true; intensity: 1.2;" 
            position="1 5 2">
        </a-entity>

        <a-entity camera></a-entity>

    </a-scene>

    <style>
        /* Evita que el navegador intente hacer zoom al tocar la pantalla */
        body { touch-action: none; }
    </style>

</body>
</html>
