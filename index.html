<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="coheteModel" src="./cohete.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity id="wrapper" rotation="0 0 0" position="0 0 0">
          <a-gltf-model 
            src="#coheteModel" 
            rotation="90 0 0" 
            position="0 0 0.1" 
            scale="0.2 0.2 0.2"
            animation="property: rotation; to: 90 360 0; dur: 10000; easing: linear; loop: true">
          </a-gltf-model>
        </a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
