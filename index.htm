<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Retícula Ancestral UCB - AR Game</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      .ui-overlay {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        width: 80%;
        max-width: 400px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-family: 'Courier New', Courier, monospace;
        text-align: center;
        border: 2px solid cyan;
        display: none; /* Oculto por defecto */
      }
      .score-board {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: rgba(0, 255, 255, 0.3);
        color: cyan;
        padding: 10px;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="scoreBoard" class="score-board">Tesoros: 0/3</div>
    <div id="uiOverlay" class="ui-overlay">
      <h3 id="popTitle">Tesoro Encontrado</h3>
      <p id="popText">Información de la carrera...</p>
      <button onclick="closeUI()" style="background: cyan; border: none; padding: 5px 10px; cursor: pointer;">Entendido</button>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-camera gps-camera rotation-reader></a-camera>

      <script>
        let treasuresFound = 0;
        const totalTreasures = 3;

        // Función para interactuar con el tesoro
        function collectTreasure(id, title, text) {
          const entity = document.querySelector(`#${id}`);
          if (entity.getAttribute('visible')) { // Solo si no ha sido recogido
            entity.setAttribute('visible', 'false'); // Desaparece
            treasuresFound++;
            document.getElementById('scoreBoard').innerText = `Tesoros: ${treasuresFound}/${totalTreasures}`;
            showUI(title, text);
          }
        }

        function showUI(title, text) {
          document.getElementById('popTitle').innerText = title;
          document.getElementById('popText').innerText = text;
          document.getElementById('uiOverlay').style.display = 'block';
        }

        function closeUI() {
          document.getElementById('uiOverlay').style.display = 'none';
          if (treasuresFound === totalTreasures) {
            alert("¡Felicidades Diseñador! Has recolectado la Retícula Ancestral completa.");
          }
        }
      </script>

      <a-entity
        id="treasure1"
        gps-camera-entity-place="latitude: -16.5235; longitude: -68.1121;"
        scale="2 2 2"
        position="0 1.5 0"
        @click="collectTreasure('treasure1', 'El Tótem Tipográfico', 'La Tipografía no es solo elegir letras; es la voz visual de tu mensaje. En la UCB dominamos la estructura para comunicar con impacto.')"
      >
        <a-box material="color: cyan; wireframe: true; opacity: 0.5;" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
        <a-text value="TÓTEM" align="center" position="0 1.2 0" color="white" width="4"></a-text>
      </a-entity>

      <a-entity
        id="treasure2"
        gps-camera-entity-place="latitude: -16.5238; longitude: -68.1125;"
        scale="1.5 1.5 1.5"
        position="0 1.0 0"
        @click="collectTreasure('treasure2', 'El Prisma Cromático', 'El Color es psicología e identidad. Aquí aprendemos a usar la paleta vibrante de Bolivia y la teoría cromática global para definir marcas.')"
      >
        <a-tetrahedron material="color: magenta; wireframe: true;" animation="property: rotation; to: 360 360 0; loop: true; dur: 7000"></a-tetrahedron>
        <a-text value="PRISMA" align="center" position="0 1.0 0" color="white" width="4"></a-text>
      </a-entity>

      <a-entity
        id="treasure3"
        gps-camera-entity-place="latitude: -16.5232; longitude: -68.1128;"
        scale="2 2 2"
        position="0 1.8 0"
        @click="collectTreasure('treasure3', 'La Matriz Digital', 'El Diseño Digital es interacción y experiencia. En la UCB te preparamos para el futuro: UX/UI, animación y entornos inmersivos.')"
      >
        <a-sphere radius="0.3" material="color: blue; wireframe: true;"></a-sphere>
        <a-entity position="0.5 0 0"><a-sphere radius="0.1" color="white"></a-sphere></a-entity>
        <a-entity position="-0.5 0 0"><a-sphere radius="0.1" color="white"></a-sphere></a-entity>
        <a-text value="MATRIZ" align="center" position="0 1.0 0" color="white" width="4"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
